<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>body{margin:0;padding:24px;background:var(--surface-card)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.stack{display:flex;flex-direction:column;gap:14px}</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, Switch, Icon } = window.FolhaDesignSystem_e132f0;
function Demo(){
  return (
    <div className="grid">
      <div className="stack">
        <Input label="Nome do paciente" placeholder="Maria Souza" leadingIcon={<Icon name="user" size={18}/>}/>
        <Input label="CPF" placeholder="000.000.000-00" hint="Apenas números"/>
        <Input label="E-mail" defaultValue="contato@" error="E-mail inválido"/>
      </div>
      <div className="stack">
        <Select label="Tipo de entrega" options={["Retirada na sede","Envio por correio","Entrega local"]}/>
        <div className="stack" style={{gap:12,marginTop:4}}>
          <Checkbox defaultChecked label="Aceito os termos da associação"/>
          <Checkbox label="Quero receber novidades"/>
          <Switch defaultChecked label="Notificações de pedido"/>
          <Switch label="Modo de alto contraste"/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
