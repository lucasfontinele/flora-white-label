<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Plus Jakarta Sans · 12 → 48px" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .spec { display: grid; gap: 16px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .line .px { width: 64px; flex: none; font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
  .t { color: var(--text-primary); letter-spacing: var(--tracking-tight); }
</style>
</head>
<body>
  <div class="spec">
    <div class="line"><span class="px">48 / 800</span><span class="t" style="font:var(--font-display)">Sua associação, organizada</span></div>
    <div class="line"><span class="px">28 / 700</span><span class="t" style="font:var(--font-page-title)">Acompanhe seu pedido</span></div>
    <div class="line"><span class="px">22 / 700</span><span class="t" style="font:var(--font-heading)">Catálogo educativo</span></div>
    <div class="line"><span class="px">18 / 400</span><span class="t" style="font-size:var(--text-md);font-weight:400">Pronto para retirada na sede</span></div>
    <div class="line"><span class="px">16 / 400</span><span class="t" style="font:var(--font-body)">Seu pedido está em separação e será enviado em breve.</span></div>
    <div class="line"><span class="px">14 / 400</span><span class="t" style="font:var(--font-body-sm);color:var(--text-secondary)">Última atualização há 2 horas · previsão 17 jun</span></div>
    <div class="line"><span class="px">12 / 600</span><span class="t" style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:var(--tracking-wide);color:var(--text-secondary)">Rastreabilidade</span></div>
  </div>
</body>
</html>
