<!-- @dsCard group="Colors" viewport="700x180" name="Primary — institutional green" subtitle="#2F6B4F · saúde, natureza, credibilidade" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,0.04); }
  .meta { margin-top: 8px; font: var(--font-body-sm); }
  .meta b { display: block; font-weight: var(--weight-semibold); color: var(--text-primary); font-size: var(--text-xs); }
  .meta span { color: var(--text-secondary); font-family: var(--font-mono); font-size: 11px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green-50)"></div><div class="meta"><b>50</b><span>#F3F8F5</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-100)"></div><div class="meta"><b>100</b><span>#DDEBE3</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-200)"></div><div class="meta"><b>200</b><span>#BCD8C8</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-300)"></div><div class="meta"><b>300</b><span>#91C0A8</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-400)"></div><div class="meta"><b>400</b><span>#5B9A7B</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-500);box-shadow:var(--shadow-primary)"></div><div class="meta"><b>500 ·</b><span>#2F6B4F</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-600)"></div><div class="meta"><b>600</b><span>#24543F</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-700)"></div><div class="meta"><b>700</b><span>#1C4232</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-800)"></div><div class="meta"><b>800</b><span>#17352A</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-900)"></div><div class="meta"><b>900</b><span>#132C23</span></div></div>
  </div>
</body>
</html>
