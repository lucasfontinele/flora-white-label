<!-- @dsCard group="Colors" viewport="700x180" name="Secondary — petroleum blue" subtitle="#1E4D5C · tecnologia, segurança, governança" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,0.04); }
  .meta { margin-top: 8px; }
  .meta b { display: block; font-weight: var(--weight-semibold); color: var(--text-primary); font-size: var(--text-xs); }
  .meta span { color: var(--text-secondary); font-family: var(--font-mono); font-size: 11px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--petrol-50)"></div><div class="meta"><b>50</b><span>#ECF3F5</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--petrol-100)"></div><div class="meta"><b>100</b><span>#CFE0E5</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--petrol-200)"></div><div class="meta"><b>200</b><span>#9DBFC9</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--petrol-300)"></div><div class="meta"><b>300</b><span>#6699A8</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--petrol-400)"></div><div class="meta"><b>400</b><span>#3A7384</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--petrol-500)"></div><div class="meta"><b>500 ·</b><span>#1E4D5C</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--petrol-600)"></div><div class="meta"><b>600</b><span>#173E4A</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--petrol-700)"></div><div class="meta"><b>700</b><span>#122F39</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--petrol-800)"></div><div class="meta"><b>800</b><span>#0E2530</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--petrol-900)"></div><div class="meta"><b>900</b><span>#0B1D26</span></div></div>
  </div>
</body>
</html>
