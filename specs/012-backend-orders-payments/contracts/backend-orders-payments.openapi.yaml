openapi: 3.1.0
info:
  title: FloraApp Orders & Payments API
  version: 0.1.0
  description: >-
    Backend-only orders and payments: patient orders with price-frozen items and
    AbacatePay-integrated payments (create, list, get, status sync). Frontend,
    visual cart, frontend checkout, cookies/IronSession, new auth, new RBAC,
    Correios, real freight, inventory reservation/decrement, payment split, real
    refund, invoice, e-mail, prescriptions-as-entity, and webhooks are out of
    scope. AbacatePay integration follows ABACATE_INTEGRATION.md and is isolated
    in the infrastructure layer; gateway secrets are never returned.
servers:
  - url: http://localhost:3333
tags:
  - name: Orders
  - name: Order Payments
paths:
  /organizations/{organizationId}/orders:
    post:
      tags: [Orders]
      summary: Create an order for a patient
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/DomainValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Orders]
      summary: List the organization's orders
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /organizations/{organizationId}/orders/{orderId}:
    get:
      tags: [Orders]
      summary: Get an order by id
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /organizations/{organizationId}/orders/{orderId}/cancel:
    patch:
      tags: [Orders]
      summary: Cancel an order
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Cancelled order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/DomainValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /organizations/{organizationId}/orders/{orderId}/payments:
    post:
      tags: [Order Payments]
      summary: Create a payment for an order (initiates AbacatePay charge)
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPayment"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/DomainValidationError"
        "502":
          $ref: "#/components/responses/GatewayError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Order Payments]
      summary: List payments of an order
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Payments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPaymentList"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /organizations/{organizationId}/orders/{orderId}/payments/{paymentId}:
    get:
      tags: [Order Payments]
      summary: Get a payment by id
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/OrderId"
        - $ref: "#/components/parameters/PaymentId"
      responses:
        "200":
          description: Payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPayment"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /organizations/{organizationId}/orders/{orderId}/payments/{paymentId}/sync-status:
    patch:
      tags: [Order Payments]
      summary: Sync a payment's status from AbacatePay
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/OrderId"
        - $ref: "#/components/parameters/PaymentId"
      responses:
        "200":
          description: Payment with synced status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPayment"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/DomainValidationError"
        "502":
          $ref: "#/components/responses/GatewayError"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  schemas:
    OrderStatus:
      type: string
      enum:
        - REQUESTED
        - UNDER_REVIEW
        - IN_SEPARATION
        - APPROVED
        - READY_FOR_PICKUP
        - SHIPPED
        - DELIVERED
        - CANCELLED
    OrderDeliveryType:
      type: string
      enum: [CORREIOS, PICKUP]
    PaymentMethod:
      type: string
      enum: [CREDIT_CARD, BOLETO, PIX]
    PaymentStatus:
      type: string
      enum:
        - PENDING
        - EXPIRED
        - CANCELLED
        - PAID
        - UNDER_DISPUTE
        - REFUNDED
        - REDEEMED
        - APPROVED
        - FAILED
    CreateOrderItemBody:
      type: object
      additionalProperties: false
      required: [productId, quantity]
      properties:
        productId:
          type: string
          minLength: 1
        quantity:
          type: integer
          minimum: 1
    CreateOrderBody:
      type: object
      additionalProperties: false
      required: [patientId, deliveryType, items]
      properties:
        patientId:
          type: string
          minLength: 1
        guardianId:
          type: [string, "null"]
        deliveryType:
          $ref: "#/components/schemas/OrderDeliveryType"
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CreateOrderItemBody"
    CreatePaymentBody:
      type: object
      additionalProperties: false
      required: [paymentMethod]
      properties:
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        discount:
          type: [number, "null"]
          minimum: 0.01
          maximum: 1
    OrderItem:
      type: object
      additionalProperties: false
      required: [id, orderId, productId, unitPrice, quantity]
      properties:
        id:
          type: string
        orderId:
          type: string
        productId:
          type: string
        unitPrice:
          type: integer
          minimum: 0
          description: Frozen product price in cents.
        quantity:
          type: integer
          minimum: 1
    OrderSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - organizationId
        - token
        - patientId
        - guardianId
        - status
        - deliveryType
        - itemsAmount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        organizationId:
          type: string
        token:
          type: string
        patientId:
          type: string
        guardianId:
          type: [string, "null"]
        status:
          $ref: "#/components/schemas/OrderStatus"
        deliveryType:
          $ref: "#/components/schemas/OrderDeliveryType"
        itemsAmount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OrderDetail:
      allOf:
        - $ref: "#/components/schemas/OrderSummary"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/OrderItem"
    OrderList:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/OrderSummary"
    OrderPayment:
      type: object
      additionalProperties: false
      required:
        - id
        - orderId
        - totalPaid
        - discount
        - paymentMethod
        - status
        - externalPaymentId
        - checkoutUrl
        - pixQrCode
        - pixQrCodeBase64
        - expiresAt
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        orderId:
          type: string
        totalPaid:
          type: integer
          minimum: 0
          description: Amount actually charged in cents (gross minus discount).
        discount:
          type: [number, "null"]
          minimum: 0.01
          maximum: 1
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        status:
          $ref: "#/components/schemas/PaymentStatus"
        externalPaymentId:
          type: [string, "null"]
          description: AbacatePay reference id. Never a secret/token.
        checkoutUrl:
          type: [string, "null"]
          description: Hosted checkout URL (card).
        pixQrCode:
          type: [string, "null"]
          description: PIX brCode (copia-e-cola).
        pixQrCodeBase64:
          type: [string, "null"]
          description: PIX brCodeBase64 (PNG).
        expiresAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OrderPaymentList:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/OrderPayment"
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
  responses:
    ValidationError:
      description: Invalid request params or body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DomainValidationError:
      description: >-
        Domain invariant violated (e.g. order without items, discount out of
        range, cancelled order, missing externalPaymentId on sync, BOLETO not
        supported by the gateway)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Organization, patient, product, order or payment not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: A PAID/APPROVED payment already exists for the order
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GatewayError:
      description: AbacatePay failure or unavailability (no orphan local payment)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unexpected failure
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
