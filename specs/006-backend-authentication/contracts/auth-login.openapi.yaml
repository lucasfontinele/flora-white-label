openapi: 3.1.0
info:
  title: FloraApp Backend Authentication API
  version: 0.1.0
  description: Backend-only login contract for existing systemic users.
paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate an existing systemic user.
      description: >
        Authenticates by e-mail and password and returns a JWT access token plus
        the public user and derived context. This endpoint does not create
        cookies, browser sessions, refresh tokens, logout state, or RBAC
        decisions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              master:
                value:
                  email: user@email.com
                  password: senha
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                master:
                  value:
                    accessToken: signed-access-token
                    user:
                      id: user-id
                      email: user@email.com
                      profile: Master
                      organizationId: organization-id
                      guardianId: null
                      patientId: null
                    context:
                      view: BackofficeMaster
                      organizationId: organization-id
                      guardianId: null
                      patientId: null
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidPayload:
                  value:
                    error: ValidationError
                    message: Invalid request body.
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidCredentials:
                  value:
                    error: AuthenticationError
                    message: Invalid credentials.
        "500":
          description: Unexpected internal failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                internal:
                  value:
                    error: InternalServerError
                    message: Internal Server Error
components:
  schemas:
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 1
    LoginResponse:
      type: object
      additionalProperties: false
      required:
        - accessToken
        - user
        - context
      properties:
        accessToken:
          type: string
          minLength: 1
        user:
          $ref: "#/components/schemas/AuthenticatedUser"
        context:
          $ref: "#/components/schemas/AuthContext"
    AuthenticatedUser:
      type: object
      additionalProperties: false
      required:
        - id
        - email
        - profile
        - organizationId
        - guardianId
        - patientId
      properties:
        id:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        profile:
          $ref: "#/components/schemas/UserProfile"
        organizationId:
          type: string
          minLength: 1
        guardianId:
          type:
            - string
            - "null"
        patientId:
          type:
            - string
            - "null"
    AuthContext:
      type: object
      additionalProperties: false
      required:
        - view
        - organizationId
        - guardianId
        - patientId
      properties:
        view:
          $ref: "#/components/schemas/AuthView"
        organizationId:
          type: string
          minLength: 1
        guardianId:
          type:
            - string
            - "null"
        patientId:
          type:
            - string
            - "null"
    UserProfile:
      type: string
      enum:
        - Master
        - Organization
        - Patient
        - Guardian
    AuthView:
      type: string
      enum:
        - BackofficeMaster
        - Organization
        - PatientPortal
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - message
      properties:
        error:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
